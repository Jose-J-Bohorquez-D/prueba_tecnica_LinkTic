spring.application.name=inventory-service

spring.datasource.url=jdbc:postgresql://localhost:5432/products_db
spring.datasource.username=test_user
spring.datasource.password=test123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8081

# =========================
# PRODUCTS SERVICE
# =========================
products.url=http://localhost:8080
products.api.key=secret123
app.api.key=secret123

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# =========================
# RESILIENCE4J (CORRECTO)
# =========================
resilience4j.circuitbreaker.instances.productsService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productsService.sliding-window-size=5
resilience4j.circuitbreaker.instances.productsService.wait-duration-in-open-state=10s

resilience4j.retry.instances.productsService.max-attempts=2
resilience4j.retry.instances.productsService.wait-duration=500ms

spring.mvc.cors.enabled=true